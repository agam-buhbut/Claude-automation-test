# Tunnel-only recursive resolver for the AmneziaWG VPN.
# Installed to /etc/unbound/unbound.conf.d/awg.conf
#
# Recursive + DNSSEC-validating (no third-party forwarder sees aggregate query
# stream) with qname-minimisation (authoritatives see only minimal labels).
# Reachable ONLY from the tunnel subnets; the nftables policy enforces this at
# the packet layer too (defense in depth). No query logging (privacy).
server:
    interface: 127.0.0.1
    interface: ::1
    interface: 10.8.0.1
    interface: fd42:8::1
    ip-freebind: yes          # bind tunnel IPs even before awg0 is up
    port: 53
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # Only the VPN clients (and localhost) may query.
    access-control: 0.0.0.0/0 refuse
    access-control: ::/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: ::1 allow
    access-control: 10.8.0.0/24 allow
    access-control: fd42:8::/64 allow

    # Privacy / anti-fingerprint.
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes
    use-caps-for-id: yes          # 0x20 query randomisation (anti-spoofing)
    log-queries: no
    log-replies: no
    verbosity: 0

    # DNSSEC hardening.
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes
    harden-below-nxdomain: yes
    aggressive-nsec: yes
    val-clean-additional: yes
    # auto-trust-anchor-file is provided by Debian's
    # /etc/unbound/unbound.conf.d/root-auto-trust-anchor-file.conf — do not
    # redeclare it here (duplicate breaks the validator module).

    # Performance / resilience.
    prefetch: yes
    prefetch-key: yes
    rrset-roundrobin: yes
    cache-min-ttl: 60
    cache-max-ttl: 86400
    so-reuseport: yes
    num-threads: 2
